          type: integer
        threeDays:
          title: Three Days
          type: integer
      type: object
    title: Computer Deny Count Dtos
    type: array
  cyberHeroManagementActive:
    title: Cyber Hero Management Active?
    type: boolean
  cyberHeroManagementConfigured:
    title: Cyber Hero Management Configured?
    type: boolean
  dateAdded:
    format: date-time
    title: Date Added
    type: string
  displayName:
