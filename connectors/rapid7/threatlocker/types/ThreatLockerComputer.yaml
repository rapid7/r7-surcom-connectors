x-samos-type-name: ThreatLockerComputer
x-samos-namespace: threatlocker
title: ThreatLocker Computer
description: Represents a Computer (Asset) details from ThreatLocker.
x-samos-extends-types:
  - type-name: Machine
    subtype-priority: 3

x-samos-keys:
  - computerId

x-samos-table:
  - name: name
  - name: username
  - name: group
  - name: organization
  - name: operatingSystem
  - name: threatLockerVersion
  - name: mode
  - name: dateCreated
  - name: lastCheckin

x-samos-detail:
  - name: name
  - name: organization
  - name: hostname
  - name: d_active
  - name: operatingSystem
  - name: osType
  - name: group
  - name: action
  - name: computerName
  - name: username
  - name: driverStatusString
  - name: lastCheckinIPAddress
  - name: lastCheckinLocalIPAddresses
  - name: mode
  - name: ipOperatingSystem
  - name: isReadyToSecure
  - name: restartComputerNeeded
  - name: serviceVersion
  - name: shouldRestart
  - name: threatLockerVersion
  - name: d_endpoint_protection_active
  - name: isTamperProtectionDisabled
  - name: versionMajor
  - name: versionMinor
  - name: targetThreatLockerVersion
  - name: maintenanceEndDate
  - name: uploadBaseFile
  - name: dateCreated
  - name: lastCheckin

x-samos-derived-properties:
  d_active:
    # Derived property to fulfill active with core.component property name.
    title: Active?
    type: boolean
    syntax: jmespath
    value: 'driverStatusString == `Active`'
    x-samos-fulfills:
      type-name: core.component
      property-name: active

  d_endpoint_protection_active:
    # Derived property to fulfill endpoint_protection_active unified property name.
    title: Endpoint Protection Active?
    type: boolean
    syntax: jmespath
    value: 'driverStatusString == `Active`'
    x-samos-fulfills:
      type-name: core.managed.endpoint
      property-name: endpoint_protection_active

  d_mitigations:
    x-samos-hidden: true
    type: array
    items:
      type: string
      x-samos-ref-types:
        - key-name: id
          type-name: Mitigation
    x-samos-fulfills:
      type-name: core.component
      property-name: mitigations
    syntax: jmespath
    # M1038 - Execution Prevention (allowlisting in Secure mode)
    # M1033 - Limit Software Installation
    value: >-
      [
        (driverStatusString == `Active` && isTamperProtectionDisabled == `false`) && `M1033` || null,
        (mode == `Secure` && driverStatusString == `Active` && isTamperProtectionDisabled == `false`) && `M1038` || null
      ] | [?@]

  d_qualified_hostname:
    # Not sure if ThreatLocker computerName is ever an FQDN, but this is here
    # just in case. J Chung 2026-Jan-21
    x-samos-hidden: true
    type: string
    syntax: jmespath
    value: 'computerName && contains(computerName, `.`) && computerName || null'
    x-samos-correlation:
      correlation-key: Machine.qualified-hostname
      correlation-type: Machine
      priority: 2

  d_unqualified_hostname:
    x-samos-hidden: true
    type: string
    syntax: jmespath
    value: 'computerName && !contains(computerName, `.`) && computerName || null'
    x-samos-correlation:
      correlation-key: Machine.unqualified-hostname
      correlation-type: Machine
      priority: 2

