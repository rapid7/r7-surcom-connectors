x-samos-type-name: SumoLogicCollectorTag
x-samos-namespace: sumo.logic
title: Sumo Logic Collector Tag
description: A tag from Sumo Logic Collector

x-samos-global-zone: true
x-samos-extends-types:
  - type-name: SourceTag

x-samos-keys:
  - id

x-samos-table:
  - name: key
  - name: value

x-samos-detail:
  - name: key
  - name: value

x-samos-derived-properties:
  d_name:
    title: Name
    x-samos-hidden: true
    type: string
    syntax: expression
    value: '{id}'
    # here id = key:value
    x-samos-fulfills:
      type-name: core.named-object
      property-name: name

properties:
  id:
    title: Id
    x-samos-immutable: true
    x-samos-hidden: true
    type: string
    x-samos-fulfills:
      type-name: SourceTag
      property-name: id

  key:
    title: Key
    type: string
    x-samos-fulfills:
      type-name: SourceTag
      property-name: key

  value:
    title: Value
    type: string
    x-samos-fulfills:
      type-name: SourceTag
      property-name: value
