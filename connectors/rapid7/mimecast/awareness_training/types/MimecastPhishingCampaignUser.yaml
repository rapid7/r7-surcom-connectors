  - name: userState
  - name: timeScheduled
  - name: clickedIp
  - name: timeReported
  - name: reactionTime
  - name: timeClicked
  - name: timeSubmitted

x-samos-detail:
  - name: name
  - name: email
  - name: templateName
  - name: department
  - name: status
  - name: timeOpened
  - name: numCampaignsSent
  - name: numCampaignsClicked
  - name: numCampaignsScanned
  - name: numCampaignsClickedScanned
  - name: numTrainingModulesAssigned
