x-samos-derived-properties:
  d_qualified_hostname:
    # Only populate qualified hostname if the computerName contains a dot, otherwise it is likely an unqualified hostname. This is to prevent populating both qualified and unqualified hostname properties with the same value, which can cause confusion and issues with correlation.
    x-samos-hidden: true
    title: Qualified Hostname
    type: string
    syntax: jmespath
    value: 'computerName && contains(computerName, `.`) && computerName || null'
    x-samos-correlation:
      correlation-key: Machine.qualified-hostname
      correlation-type: Machine
      priority: 2

  d_unqualified_hostname:
    # Only populate unqualified hostname if the computerName does not contain a dot, otherwise it is likely a qualified hostname. This is to prevent populating both qualified and unqualified hostname properties with the same value, which can cause confusion and issues with correlation.
    x-samos-hidden: true
    title: Unqualified Hostname
    type: string
    syntax: jmespath
    value: 'computerName && !contains(computerName, `.`) && computerName || null'
    x-samos-correlation:
      correlation-key: Machine.unqualified-hostname
      correlation-type: Machine
      priority: 2

  d_ep_active:
    title: Endpoint Protection Active?
    x-samos-hidden: true
    type: boolean
    syntax: jmespath
    value: "amStatus != null && amStatus != 'Not Installed'"
    x-samos-fulfills:
      type-name: core.managed.endpoint
      property-name: endpoint_protection_active

  d_mitigations:
    # M1049 - Antivirus/Antimalware (scanning for malicious files)
    # M1040 - Behavior Prevention on Endpoint (ability to kill/suspend processes)
    # M1041 - Encrypt Sensitive Information
    x-samos-hidden: true
    title: Mitigations
    type: array
    syntax: jmespath
    value: >
      [
        daInstalled == `true` && 'M1040',
        amStatus && amStatus != 'Not Installed' && 'M1049',
        computerFdeStatus && computerFdeStatus != 'Not Installed' && 'M1041'
      ] | [?@]
    items:
      type: string
      x-samos-ref-types:
        - key-name: id
          type-name: Mitigation
    x-samos-fulfills:
      type-name: core.component
      property-name: mitigations

