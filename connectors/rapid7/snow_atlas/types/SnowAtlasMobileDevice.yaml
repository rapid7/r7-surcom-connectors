x-samos-type-name: SnowAtlasMobileDevice
x-samos-namespace: snow.atlas
title: Snow Atlas Mobile Device
description: Represents a mobile device asset from Snow Atlas.
x-samos-detail-prefer-type-title: true

x-samos-extends-types:
  - type-name: Machine
    subtype-priority: 3

$ref: https://example1.githubusercontent.com/SnowSoftware/snowatlas-integrations/mobile_device#/components/schemas/FilteredResponseWithLinksOfMobileDevice/properties/items#/components/schemas/MobileDevice

x-samos-keys:
  - id

x-samos-table:
  - name: name
  - name: manufacturer
  - name: model
  - name: operatingSystem
  - name: phoneNumber
  - name: status
  - name: organizationId
  - name: isTablet

x-samos-detail:
  - name: name
  - name: manufacturer
  - name: model
  - name: operatingSystem
  - name: phoneNumber
  - name: status
  - name: organizationId
  - name: isTablet

x-samos-derived-properties:
  d_active:
    # fulfills the 'Active' boolean property to core.component.active
    title: Active?
    type: boolean
    syntax: jmespath
    value: 'status == `Active`'
    x-samos-hidden: true
    x-samos-fulfills:
      type-name: core.component
      property-name: active

properties:
  id:
    title: ID
    type: string
    x-samos-immutable: true
    x-samos-fulfills:
      type-name: core.component
      property-name: id

  name:
    title: Device Name
    type: string
    x-samos-fulfills:
      type-name: core.named-object
      property-name: name

  organizationId:
    title: Organization
    type: string
    x-samos-ref-types:
      - type-name: SnowAtlasOrganization
        key-name: id
    x-samos-fulfills:
      type-name: core.owned-entity
      property-name: organization

  manufacturer:
    title: Manufacturer
    type: string
    x-samos-fulfills:
      type-name: core.managed.asset
      property-name: make

  model:
    title: Model
    type: string
    x-samos-fulfills:
      type-name: core.managed.asset
      property-name: model

  operatingSystem:
    title: Operating System
    type: string
    x-samos-fulfills:
      type-name: Machine
      property-name: operating_system

  phoneNumber:
    title: Phone Number
    type: string

  status:
    title: Status
    type: string
    x-samos-ref-types:
      - type-name: SnowAtlasOperationalStatusEnum
        key-name: id
    x-samos-fulfills:
      type-name: core.component
      property-name: operational_status

  isTablet:
    title: Tablet?
    type: boolean

  _links:
    x-samos-hidden: true
    title: Links
    type: array
    items:
      type: object
      properties:
        href:
          title: Href
          type: string
        rel:
          title: Relation
          type: string
        method:
          title: Method
          type: string
