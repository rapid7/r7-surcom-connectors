x-samos-type-name: SolarWindsITAMHardware
x-samos-namespace: solarwinds.itam
title: SolarWinds ITAM Hardware
description: A hardware asset from SolarWinds IT Asset Management.

# Extends Machine because hardware assets are physical/virtual computing devices.
# Machine extends core.component, core.managed.asset, core.managed.endpoint providing
# properties like ips, mac_addresses, operating_system, serial_number, asset_tag, etc.
# subtype-priority: 3 ensures this is a lower-priority match vs other Machine subtypes.
x-samos-extends-types:
  - type-name: Machine
    subtype-priority: 3

$ref: https://api.samanage.com#/components/schemas/Hardware

# Key: d_id (string conversion of integer id). Used as the unique identifier for this asset.
x-samos-keys:
  - d_id
  - id

x-samos-table:
  - name: name
  - name: ip
  - name: category.name
  - name: status.name
  - name: operating_system
  - name: serial_number
  - name: site.id

x-samos-detail:
  - name: name
  - name: ip
  - name: external_ip
  - name: category.name
  - name: status.name
  - name: operating_system
  - name: operating_system_version
  - name: cpu
  - name: physical_memory
  - name: model
  - name: serial_number
  - name: asset_tag
  - name: username
  - name: domain
  - name: site.id
  - name: department.id
  - name: owner_id
  - name: description
  - name: processor_speed
  - name: latitude
  - name: longitude
  - name: created_at
  - name: updated_at
  - name: detected_at

# x-samos-virtual:
#   installed_software:
#     type-name: Software
#     cypher-pattern: >-
#       <-[:`e:SolarWindsITAMSoftwareInstallation:x_hardware_id`]- (:SolarWindsITAMSoftwareInstallation) -[:`e:SolarWindsITAMSoftwareInstallation:x_software_id`]-> (:SolarWindsITAMSoftware)

x-samos-derived-properties:
  d_id:
    # API returns id as integer but core.component:id requires string type.
    x-samos-hidden: true
    x-samos-immutable: true
    type: string
    syntax: jmespath
    value: id
    x-samos-fulfills:
      type-name: core.component
      property-name: id

  d_active:
    # Converts status to boolean: true when status.name equals 'Operational'.
    x-samos-hidden: true
    type: boolean
    syntax: jmespath
    value: "status.name == 'Operational'"
    x-samos-fulfills:
      type-name: core.component
      property-name: active

  d_mac_addresses:
    # mac_addresses is a string but we need array[string]
    x-samos-hidden: true
    type: array
    syntax: jmespath
    value: 'networks[].mac_address'
    items:
      type: string
      format: mac-addr
    x-samos-correlation:
      correlation-key: MacAddr.value
      correlation-type: Machine
      priority: 3
    x-samos-fulfills:
      type-name: Machine
      property-name: mac_addresses

  d_ip_addresses:
    # ips is string but we need array[string]
    x-samos-hidden: true
    type: array
    syntax: jmespath
    value: 'networks[].ip_address'
    items:
      type: string
      format: ip-addr
    x-samos-fulfills:
      type-name: Machine
      property-name: ips

  d_make:
    # Derived because manufacturer is nested inside bioses[] array.
    # Extracts the first BIOS manufacturer to fulfill core.managed.asset:make.
    x-samos-hidden: true
    type: string
    syntax: jmespath
    value: 'bioses[0].manufacturer'
    x-samos-fulfills:
      type-name: core.managed.asset
      property-name: make

  d_hostnames:
    # Derived because Machine:hostnames expects an array but API provides single name string.
    # Wraps name in array to fulfill Machine:hostnames.
    x-samos-hidden: true
    type: array
    syntax: jmespath
    value: '[name]'
    items:
      type: string
    x-samos-fulfills:
      type-name: Machine
      property-name: hostnames

