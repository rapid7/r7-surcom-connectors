x-samos-derived-properties:
  d_fqdn:
    x-samos-hidden: true
    type: string
    syntax: jmespath
    value: 'Hostname && contains(Hostname, `.`) && Hostname || DNSName && contains(DNSName, `.`) && DNSName || `null`'
    x-samos-correlation:
      correlation-key: Machine.qualified-hostname
      correlation-type: Machine
      priority: 3
  d_unqualified_hostname:
    x-samos-hidden: true
    type: string
    syntax: jmespath
    value: 'Hostname && !contains(Hostname, `.`) && Hostname || DNSName && !contains(DNSName, `.`) && DNSName || `null`'
    x-samos-correlation:
      correlation-key: Machine.unqualified-hostname
      correlation-type: Machine
      priority: 3

