    # Converting NodeID integer to string for fulfills core.component:id
    title: ID
    type: string
    syntax: jmespath
    value: 'NodeID'
    x-samos-hidden: true
    x-samos-immutable: true
    x-samos-fulfills:
      type-name: core.component
      property-name: id

  d_status:
    title: Active?
    type: boolean
    syntax: jmespath
    value: 'Status == `1`'
    x-samos-fulfills:
      type-name: core.component
      property-name: active

