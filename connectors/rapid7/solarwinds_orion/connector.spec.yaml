id: solarwinds.orion
name: SolarWinds Orion
author: Rapid7
version: 1.3.0
notice: Copyright © 2025 Rapid7. All rights reserved.

current_changes:
  - Pin dependencies

reference-schemas:
  - url: https://solarwinds.github.io/OrionSDK/2024.4
    file: refdocs/swagger.json

types:
  - SolarWindsOrionNode
  - SolarWindsOrionAgent
  - SolarWindsOrionApplication
  - SolarWindsOrionApplicationTemplate

functions:
  - id: test
  - id: import_all
    title: SolarWinds Orion Agents, Nodes, and Applications
    description: Imports all agents, nodes, applications and application templates from SolarWinds Orion
    return_types:
      - SolarWindsOrionNode
      - SolarWindsOrionApplication
      - SolarWindsOrionApplicationTemplate
      - SolarWindsOrionAgent

# Settings that will be used to configure this Connector.
settings:
  url:
    type: string
    title: Base URL
    example: https://10.17.88.100:17774
    description: The Base URL for the SolarWinds Orion API, default port is 17774

  username:
    type: string
    title: Username
    example: admin
    description: Username for the SolarWinds Orion API

  password:
    type: string
    title: Password
    format: password
    description: Password for the SolarWinds Orion API

  node_sub_type:
    type: array
    title: Node Type(s)
    description: The types of nodes to import from SolarWinds Orion
    items:
      type: string
      enum:
        - Agent
        - SNMP
        - ICMP
        - Other
    default:
      - Agent

  verify_tls:
    type: boolean
    title: Verify TLS?
    description: If enabled, verify the server's identity
    default: true

# The runtime platform for this connector.
runtime: py311

# List any Python dependencies available on PyPI that are required by this connector.
# `codegen` will generate a `requirements.txt` file with pinned versions of these dependencies.
python_dependencies:
  - orionsdk

# The list of categories for this Connector in the Extension Library.
categories:
  - asset_management
  - security_operations
