x-samos-derived-properties:
  d_ips:
    # Derived property to fulfill ips unified property name.
    title: IPs
    type: array
    syntax: jmespath
    value: '[IPAddress, IPv6Address][]'
    items:
      type: string
      format: ip-addr
    x-samos-fulfills:
      type-name: Machine
      property-name: ips

  d_qualified_hostname:
    # Deriving  for qualified hostname
    type: string
    syntax: jmespath
    value: 'AgentName && contains(AgentName, `.`) && AgentName || null'
    x-samos-correlation:
      correlation-key: Machine.qualified-hostname
      correlation-type: Machine
      priority: 2

  d_unqualified_hostname:
    # Deriving for unqualified hostname
    x-samos-hidden: true
    type: string
    syntax: jmespath
    value: 'AgentName && !contains(AgentName, `.`) && AgentName || null'
    x-samos-correlation:
      correlation-key: Machine.unqualified-hostname
      correlation-type: Machine
      priority: 2

  d_active:
    # Deriving active status from Online property, where Online == 11 means active/online.
    type: boolean
    title: Active?
    syntax: jmespath
    value: 'Online == `11`'
    x-samos-fulfills:
      type-name: core.component
      property-name: active

  d_agent_version:
    # Derived property to fulfill agent_version unified property name.
    # converting from integer to string to match the syntax.
    title: Agent Version
    type: string
    syntax: jmespath
    value: 'AgentVersion'
    x-samos-fulfills:
      type-name: core.managed.endpoint
      property-name: agent_version

properties:
  AgentId:
    title: Agent ID
    type: string
    x-samos-immutable: true
    x-samos-hidden: true
    x-samos-fulfills:
