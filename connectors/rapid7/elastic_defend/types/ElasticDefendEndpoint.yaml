                title: ID
                type: string
              revision:
                title: Revision
                type: integer
          configured:
            title: Configured
            type: object
            properties:
              id:
                title: ID
                type: string
              revision:
                title: Revision
                type: integer
      endpoint:
        title: Endpoint
        type: object
        properties:
          id:
            title: ID
            type: string
          revision:
            title: Revision
            type: integer
