      host:
        title: Host
        type: object
        properties:
          architecture:
            title: Architecture
            type: string
            x-samos-fulfills:
              type-name: Machine
              property-name: os_architecture
          hostname:
            title: Hostname
            type: string
            x-samos-fulfills:
              type-name: Machine
              property-name: hostnames
            x-samos-correlation:
              correlation-key: Machine.unqualified-hostname
              correlation-type: Machine
              priority: 2
          id:
            title: ID
            type: string
          ip:
            title: IP
            type: array
            items:
              type: string
              format: ip-addr
            x-samos-fulfills:
              type-name: Machine
              property-name: ips
          mac:
            title: Mac
            type: array
            items:
              type: string
              format: mac-addr
            x-samos-fulfills:
              type-name: Machine
              property-name: mac_addresses
            x-samos-correlation:
              correlation-key: MacAddr.value
              correlation-type: Machine
              priority: 4
          name:
            title: Name
            type: string
          os:
            title: OS
            type: object
