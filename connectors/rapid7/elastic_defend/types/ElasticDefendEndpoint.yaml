                  property-name: asset_type
              version:
                title: OS Version
                type: string
                x-samos-fulfills:
                  type-name: Machine
                  property-name: os_version
  policy_info:
    title: Policy Info
    type: object
    x-samos-hidden: true
    # does not have much information about the policy, so hidden for now
    properties:
      agent:
        title: Agent
        type: object
        properties:
          applied:
            title: Applied
            type: object
