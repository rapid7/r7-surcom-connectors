x-samos-type-name: ElasticDefendHostEntity
x-samos-namespace: elastic.defend
title: Elastic Defend Host Entity
description: Represents a host entity in the Elastic Defend API.
x-samos-detail-prefer-type-title: true

x-samos-extends-types:
  - type-name: Machine
    subtype-priority: 5

x-samos-keys:
  - entity.id

x-samos-table:
  - name: core.named-object:name
  - name: d_os
  - name: host.risk.calculated_level
  - name: host.risk.calculated_score
  - name: host.risk.calculated_score_norm
  - name: event.ingested

x-samos-detail:
  - name: host
  - name: entity
  - name: asset
  - name: '@timestamp'
  - name: event.ingested

x-samos-derived-properties:
  d_architecture:
    # The property "host.architecture" is an array, Machine:os_architecture type is string,
    # so we derived property to the first non-null value to fulfills the Machine:os_architecture property.
    x-samos-hidden: true
    title: Architecture
    type: string
    syntax: jmespath
    value: 'host.architecture[?@ != null] | [0]'
    x-samos-fulfills:
      type-name: Machine
      property-name: os_architecture
  d_os:
    # The property "host.os.name" is an array, Machine:operating_system type is string,
    # so we derived property to the first non-null value to fulfills the Machine:operating_system property.
    title: OS
    x-samos-hidden: true
    type: string
    syntax: jmespath
    value: 'host.os.name[?@ != null] | [0]'
    x-samos-fulfills:
      type-name: Machine
      property-name: operating_system
