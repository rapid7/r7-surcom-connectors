x-samos-derived-properties:
  d_active:
    title: Active?
    type: boolean
    syntax: jmespath
    value: 'metadata.status == `ONLINE`'
    x-samos-fulfills:
      type-name: core.component
      property-name: active

  d_name:
    # The property 'hostname' Fulfills core.named-object:hostname,
    # so we create d_name to fulfill core.named-object:name
    x-samos-hidden: true
    title: Name
    type: string
    syntax: jmespath
    value: hostname
    x-samos-fulfills:
      type-name: core.named-object
      property-name: name

  d_last_seen:
    # The property 'lastInterrogation' Fulfills core.managed.endpoint:last_scan,
    # so we create d_last_seen to fulfill core.managed.endpoint:endpoint_last_seen
    type: string
    format: date-time
    syntax: jmespath
    value: lastInterrogation
    x-samos-fulfills:
      type-name: core.managed.endpoint
      property-name: endpoint_last_seen

  d_mitigations:
    title: Mitigations
    syntax: jmespath
    value: '["M1016"]'
    type: array
    items:
      type: string
      x-samos-ref-types:
        - type-name: Mitigation
          key-name: id
    x-samos-fulfills:
      type-name: core.component
      property-name: mitigations

