x-samos-type-name: PhosphorusDevice
x-samos-namespace: phosphorus
title: Phosphorus Device
description: Device for Phosphorus

x-samos-extends-types:
  - type-name: Machine
    subtype-priority: 3

$ref: https://phosphorus.io/api/swagger/public/swagger.json#/components/schemas/getSearchResponse/properties/devices/items

x-samos-keys:
  - id

x-samos-table:
  - name: addr
  - name: hostname
  - name: manufacturer
  - name: model
  - name: type
  - name: firmware
  - name: mac
  - name: d_active
  - name: created
  - name: lastInterrogation

x-samos-detail:
  - name: addr
  - name: manufacturer
  - name: icon
  - name: lost
