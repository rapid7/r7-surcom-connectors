x-samos-derived-properties:
  d_id:
    type: string
    title: ID
    syntax: expression
    value: '{AssetID}'
    x-samos-immutable: true
    x-samos-hidden: true
    x-samos-fulfills:
      type-name: core.component
      property-name: id

  d_hostnames:
    x-samos-hidden: true
    type: string
    syntax: jmespath
    value: '[AssetName] | [] | [?@]'
    x-samos-fulfills:
      type-name: Machine
      property-name: hostnames

