      type-name: core.component
      property-name: active
  isNetworkingDevice:
    type: boolean
    title: Networking Device?
  isWireless:
    type: boolean
    title: Wireless?
  deviceClass:
    type: string
    title: Device Class
  managedBy:
    type: string
    title: Managed By
  anomalyPresent:
    type: boolean
    title: Anomaly Present?
  mds2:
    type: string
