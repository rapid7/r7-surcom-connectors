    title: Serial Number
    x-samos-fulfills:
      type-name: core.managed.asset
      property-name: serial_number
    x-samos-correlation:
      correlation-key: core.managed.asset.serial_number
      correlation-type: Machine
      priority: 3
  department:
    type: string
    title: Department
  facility:
    type: string
    title: Facility
  hardwareArchitecture:
    type: string
    title: Hardware Architecture
    x-samos-fulfills:
      type-name: Machine
      property-name: os_architecture
  hostName:
    type: string
    title: Hostname
    x-samos-fulfills:
      type-name: core.named-object
      property-name: name
    x-samos-correlation:
      correlation-key: Machine.unqualified-hostname
      correlation-type: Machine
      priority: 2
  location:
    type: string
    title: Location
  region:
    type: string
    title: Region
  softwareVersion:
    type: string
    title: Software Version
  storesEphi:
    type: boolean
    title: Stores EPHI?
  transmitEphi:
    type: boolean
    title: Transmit EPHI?
  riskScore:
    type: integer
    title: Risk Score
  likelihood:
    type: number
    title: Likelihood
  impact:
    type: integer
    title: Impact
  patientImpact:
    type: integer
    title: Patient Impact
  businessImpact:
    type: integer
    title: Business Impact
  dataImpact:
    type: integer
    title: Data Impact
  avgUtilizationPercent:
    type: number
    title: Avg Utilization Percent
  utilizationPercent:
    type: number
    title: Utilization Percent
  uptime:
    type: integer
    title: Uptime
  isConnected:
    type: boolean
    title: Connected?
  isCurrentlyInUse:
    type: boolean
    title: Currently In Use?
