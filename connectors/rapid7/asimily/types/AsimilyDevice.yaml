x-samos-derived-properties:
  d_device_id:
    # Derived and fulfills id unified property name for core.component:id and will accept string type.
    title: Device ID
    type: string
    syntax: expression
    value: '{deviceID}'
    x-samos-hidden: true
    x-samos-immutable: true
    x-samos-fulfills:
      type-name: core.component
      property-name: id

  d_hostname:
    # Fulfills hostname unified property name.
    # derived hostname property because it already fulfills core.named-object:name.
    type: string
    syntax: expression
    value: '{hostName}'
    x-samos-hidden: true
    x-samos-fulfills:
      type-name: Machine
      property-name: hostnames

  d_endpoint_protected:
    # Derived property to fulfill endpoint_protection_active unified property name.
    # Some of the values in isUsingEndpointSecurity is null so deriving to boolean.
    title: Endpoint Protected?
    type: boolean
    syntax: expression
    value: 'isUsingEndpointSecurity == `true`'
    x-samos-fulfills:
      type-name: core.managed.endpoint
      property-name: endpoint_protection_active

  d_ips:
    # Derived property to fulfill ips unified property name.
    title: IPs
    type: array
    syntax: jmespath
    value: '[v4IpAddrs, v6IpAddrs][]'
    items:
      type: string
      format: ip-addr
    x-samos-fulfills:
      type-name: Machine
      property-name: ips

  d_mitigations:
    x-samos-hidden: true
    type: array
    syntax: jmespath
    # M1012 (Mobile: Enterprise Policy, aka EMM/MDM) if "managedBy": "MDM"
    # M1016	Vulnerability Scanning
    # M1049	Antivirus/Antimalware
    value: >-
      [
        contains(managedBy || ``, `MDM`) && `M1012`,
        `M1016`,
        isUsingEndpointSecurity == `true` && `M1049`
      ] | [?@]
    items:
      type: string
      x-samos-ref-types:
        - key-name: id
          type-name: Mitigation
    x-samos-fulfills:
      type-name: core.component
      property-name: mitigations

properties:
  deviceID:
    type: integer
    title: Device ID
    x-samos-hidden: true
  macAddr:
    type: string
    title: MAC Address
    format: mac-addr
    x-samos-fulfills:
      type-name: Machine
      property-name: mac_addresses
    x-samos-correlation:
      correlation-key: MacAddr.value
      correlation-type: Machine
      priority: 4
  v4IpAddrs:
    type: array
    title: IPv4 Address
    items:
      type: string
      format: ip-addr
  v6IpAddrs:
    type: array
    title: IPv6 Address
    items:
      type: string
      format: ip-addr
  manufacturer:
    type: string
    title: Manufacturer
    x-samos-fulfills:
      type-name: core.managed.asset
      property-name: make
  deviceModel:
    type: string
    title: Device Model
    x-samos-fulfills:
      type-name: core.managed.asset
      property-name: model
  os:
    type: string
    title: OS
    x-samos-fulfills:
      type-name: Machine
      property-name: operating_system
  osVersion:
    type: string
    title: OS Version
    x-samos-fulfills:
      type-name: Machine
      property-name: os_version
  deviceType:
    type: string
    title: Device Type
    x-samos-fulfills:
      type-name: core.managed.asset
      property-name: asset_type
  deviceFamilies:
    type: array
    title: Device Families
    items:
