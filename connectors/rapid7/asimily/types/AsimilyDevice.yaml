x-samos-virtual:
  vulnerabilities:
    type-name: Vulnerability
    cypher-pattern: >
      <-[:`e:Finding:applies_to`]-(:AsimilyVulnerabilityFinding)-[:`e:Finding:vulnerability`]->(v:AsimilyVulnerability)
  exposures:
    type-name: Exposure
    cypher-pattern: >
      <-[:`e:Finding:applies_to`]-(:AsimilyAnomalyFinding)-[:`e:Finding:vulnerability`]->(e:AsimilyAnomaly)
