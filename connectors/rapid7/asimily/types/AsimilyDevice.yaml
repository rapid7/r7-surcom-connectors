x-samos-type-name: AsimilyDevice
x-samos-namespace: asimily
title: Asimily Device
description: Representing a device type from Asimily

x-samos-extends-types:
  - type-name: Machine
    subtype-priority: 3

x-samos-keys:
  - d_device_id

x-samos-table:
  - name: hostName
  - name: macAddr
  - name: deviceType
  - name: manufacturer
  - name: deviceModel
  - name: serialNumber
  - name: os
  - name: managedBy
  - name: lastDiscoveredAt

x-samos-detail:
  - name: hostName
  - name: macAddr
  - name: deviceType
  - name: manufacturer
  - name: deviceModel
  - name: os
  - name: isNetworkingDevice
  - name: isUsingEndpointSecurity
  - name: serialNumber
