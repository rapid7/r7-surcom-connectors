x-samos-type-name: DelineaSecretServerUser
x-samos-namespace: delinea.secret.server
title: Delinea User
description: User details from Delinea Secret Server

x-samos-extends-types:
  - type-name: User

x-samos-keys:
  - d_id
  - id

x-samos-table:
  - name: userName
  - name: displayName
  - name: emailAddress
  - name: enabled
  - name: created
  - name: lastLogin

x-samos-detail:
  - name: userName
  - name: displayName
  - name: emailAddress
  - name: enabled
  - name: created
  - name: lastLogin
  - name: domainName
  - name: externalUserSource
  - name: isLockedOut
  - name: loginFailures
  - name: isApplicationAccount
  - name: platformIntegrationType
  - name: twoFactorMethod

x-samos-derived-properties:
  d_id:
    type: string
    title: ID
    syntax: jmespath
    value: id
    x-samos-immutable: true
    x-samos-hidden: true
    x-samos-fulfills:
      type-name: User
      property-name: id

  d_has_mfa:
    x-samos-hidden: true
    type: boolean
    syntax: jmespath
    value: "twoFactorMethod != 'None' && twoFactorMethod != null"
    x-samos-fulfills:
      type-name: core.principal
      property-name: has_mfa

  d_mitigations:
    x-samos-hidden: true
    type: array
    items:
      type: string
      x-samos-ref-types:
        - key-name: id
          type-name: Mitigation
    syntax: jmespath
    value: |
      [
        (twoFactorMethod != 'None' && twoFactorMethod != null) && `M1032` || null
      ] | [?@]
    x-samos-fulfills:
      type-name: core.principal
      property-name: mitigations

properties:
  created:
    format: date-time
    title: Created
    type: string
    x-samos-fulfills:
      type-name: core.principal
      property-name: first_seen
  displayName:
    title: Display Name
    type: string
    x-samos-fulfills:
      type-name: core.named-object
      property-name: name
  domainId:
    title: Domain ID
    type: integer
  domainName:
    title: Domain Name
    type: string
  emailAddress:
    title: Email Address
    type: string
    x-samos-fulfills:
      type-name: User
      property-name: email
    x-samos-correlation:
      correlation-key: User.email
      correlation-type: User
      priority: 1
  enabled:
    title: Enabled?
    type: boolean
  externalUserSource:
    title: External User Source
    type: string
  id:
    title: ID
    type: integer
    x-samos-immutable: true
  isApplicationAccount:
    title: Application Account?
    type: boolean
  isLockedOut:
    title: Locked Out?
    type: boolean
  lastLogin:
    format: date-time
    title: Last Login
    type: string
    x-samos-fulfills:
      type-name: core.principal
      property-name: last_seen
  loginFailures:
    title: Login Failures
    type: integer
  platformIntegrationType:
    title: Platform Integration Type
    type: string
  twoFactorMethod:
    title: Two Factor Method
    type: string
  userName:
    title: User Name
    type: string
    x-samos-fulfills:
      type-name: User
      property-name: username
