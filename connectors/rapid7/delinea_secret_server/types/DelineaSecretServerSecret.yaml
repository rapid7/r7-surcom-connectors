x-samos-type-name: DelineaSecretServerSecret
x-samos-namespace: delinea.secret.server
title: Delinea Secret
description: Secret details from Delinea Secret Server

x-samos-extends-types:
  - type-name: core.named-object
  - type-name: core.component

x-samos-keys:
  - d_id
  - id

x-samos-table:
  - name: name
  - name: secretTemplateName
  - name: createDate
  - name: lastAccessed

x-samos-detail:
  - name: name
  - name: secretTemplateName
  - name: folderPath
  - name: active
  - name: checkedOut
  - name: isRestricted
  - name: isOutOfSync
  - name: outOfSyncReason
  - name: lastHeartBeatStatus
  - name: lastPasswordChangeAttempt
  - name: responseCodes
  - name: lastAccessed
  - name: extendedFields
  - name: checkOutEnabled
  - name: autoChangeEnabled
  - name: doubleLockEnabled
  - name: requiresApproval
  - name: requiresComment
  - name: hidePassword
  - name: inheritsPermissions
  - name: checkOutUserName
  - name: daysUntilExpiration
  - name: createDate
  - name: secretTemplateId
  - name: iconName

x-samos-derived-properties:
  d_id:
    type: string
    title: ID
    syntax: jmespath
    value: id
    x-samos-immutable: true
    x-samos-hidden: true
    x-samos-fulfills:
      type-name: core.component
      property-name: id

properties:
  active:
    title: Active?
    type: boolean
    x-samos-fulfills:
      type-name: core.component
      property-name: active
  autoChangeEnabled:
    title: Auto Change Enabled?
    type: boolean
  checkOutEnabled:
    title: Check Out Enabled?
    type: boolean
  checkOutUserId:
    title: Check Out User ID
    type: integer
  checkOutUserName:
    title: Check Out User Name
    type: string
  checkedOut:
    title: Checked Out?
    type: boolean
  createDate:
    format: date-time
    title: Create Date
    type: string
  daysUntilExpiration:
    title: Days Until Expiration
    type: integer
  doubleLockEnabled:
    title: Double Lock Enabled?
    type: boolean
  extendedFields:
    title: Extended Fields
    type: string
  folderId:
    title: Folder ID
    type: integer
  folderPath:
    title: Folder Path
    type: string
  hasLauncher:
    title: Launcher?
    type: boolean
  hidePassword:
    title: Hide Password?
    type: boolean
  iconId:
    title: Icon ID
    type: string
  iconName:
    title: Icon Name
    type: string
  id:
    title: ID
    type: integer
    x-samos-immutable: true
  inheritsPermissions:
    title: Inherits Permissions?
    type: boolean
  isOutOfSync:
    title: Out Of Sync?
    type: boolean
  isRestricted:
    title: Restricted?
    type: boolean
  lastAccessed:
    format: date-time
    title: Last Accessed
    type: string
  lastHeartBeatStatus:
    title: Last Heart Beat Status
    type: string
  lastPasswordChangeAttempt:
    format: date-time
    title: Last Password Change Attempt
    type: string
  name:
    title: Name
    type: string
    x-samos-fulfills:
      type-name: core.named-object
      property-name: name
  outOfSyncReason:
    title: Out Of Sync Reason
    type: string
  requiresApproval:
    title: Requires Approval?
    type: boolean
  requiresComment:
    title: Requires Comment?
    type: boolean
  responseCodes:
    title: Response Codes
    type: string
  secretTemplateId:
    title: Secret Template ID
    type: integer
  secretTemplateName:
    title: Secret Template Name
    type: string
  siteId:
    title: Site ID
    type: integer

x-samos-virtual:
  users:
    cypher-pattern: >
      <-[:`e:DelineaSecretServerSecretPermission:secretId`]-(:DelineaSecretServerSecretPermission)-[:`e:DelineaSecretServerSecretPermission:userId`]->(:DelineaSecretServerUser)
    type-name: DelineaSecretServerUser
