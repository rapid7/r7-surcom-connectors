x-samos-derived-properties:
  d_id:
    # Deriving id property to fulfill core.principal.id
    # to make it into a string version
    x-samos-hidden: true
    x-samos-immutable: true
    type: string
    syntax: jmespath
    value: id
    x-samos-fulfills:
      type-name: User
      property-name: id

  d_email:
    # Deriving email property to fulfill core.principal.email
    # which is of type string in EZO AssetSonarAsset type
    x-samos-hidden: true
    title: Email
    type: string
    syntax: jmespath
    value: 'email'
    x-samos-fulfills:
      type-name: User
      property-name: email

  d_active:
    # The "status" property has an integer ID in the response as 1 or 2
    # Deriving the `status` property to fulfills `core.principal:active` which is of type boolean
    title: Active?
    type: boolean
    value: 'status == `1`'
    syntax: jmespath
    x-samos-fulfills:
      type-name: core.principal
      property-name: active

