x-samos-type-name: EzoAssetSonarSubGroup
x-samos-namespace: ezo.assetsonar
title: Ezo AssetSonar Sub Group
description: A sub group from AssetSonar

x-samos-extends-types:
  - type-name: core.component-group
    subtype-priority: 3

x-samos-keys:
  - d_id # derived property to string type as id is of integer type in response to fulfill core.component.id
  - id # To use it for reference in EzoAssetSonarAsset type
x-samos-table:
  - name: name
  - name: description
  - name: active
  - name: d_group
  - name: assets_count
  - name: created_at
  - name: updated_at

x-samos-detail:
  - name: name
  - name: description
  - name: active
  - name: d_group
  - name: assets_count
  - name: subgroup_path
  - name: created_at
  - name: updated_at

x-samos-derived-properties:
  d_id:
    # Derived property to convert integer id to string type
    # to fulfill core.component.id which requires string type
    x-samos-immutable: true
    x-samos-hidden: true
    type: string
    syntax: jmespath
    value: 'id'
    x-samos-fulfills:
      type-name: core.component
      property-name: id

  d_group:
    # Derived property to reference EzoAssetSonarGroup id
    # which is of integer type to fulfill core.component.is_part_of_ref which requires string type
    title: Group
    type: string
    syntax: jmespath
    value: 'group_id'
    x-samos-ref-types:
      - type-name: EzoAssetSonarGroup
        key-name: d_id
    x-samos-fulfills:
      type-name: core.component
      property-name: is_part_of_ref

