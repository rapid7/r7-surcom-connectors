components:
  schemas:
    GroupRepresentation:
      properties:
        subGroups:
          items:
            type: object
            $ref: null # to bypass recursive reference

    ClientRepresentation:
      properties:
        protocolMappers:
          items:
            type: object
            $ref: null # to bypass recursive reference
        authorizationSettings:
          type: object
          $ref: null

    MultivaluedHashMapStringComponentExportRepresentation:
      additionalProperties:
        items:
          type: object
          $ref: null

    ApplicationRepresentation:
      properties:
        authorizationSettings:
          type: object
          $ref: null

    OAuthClientRepresentation:
      properties:
        authorizationSettings:
          type: object
          $ref: null

    ScopeRepresentation:
      properties:
        policies:
          items:
            type: object
            $ref: null

        resources:
          items:
            type: object
            $ref: null

    ErrorRepresentation:
      properties:
        errors:
          items:
            type: object
            $ref: null

    PolicyEvaluationResponse:
      properties:
        results:
          items:
            type: onject
            $ref: null

    PolicyResultRepresentation:
      properties:
        policy:
          items:
            type: object
            $ref: null
        associatedPolicies:
          items:
            type: object
            $ref: null

