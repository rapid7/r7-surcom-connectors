    x-samos-hidden: true
    type: array
    syntax: jmespath
    value: '[Name]|[?@]'
    items:
      type: string
    x-samos-fulfills:
      type-name: Machine
      property-name: hostnames

  d_active:
    # To fulfill active? field with a boolean value
