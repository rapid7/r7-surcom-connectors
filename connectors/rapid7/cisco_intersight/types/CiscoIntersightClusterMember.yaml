x-samos-derived-properties:
  d_name:
    # No Name field present so derived the name
    title: Name
    type: string
    syntax: expression
    value: '{ConnectedHost}_{AppPartitionNumber}'
    x-samos-fulfills:
      type-name: core.named-object
      property-name: name

  d_active:
    # To fulfill active? field with a boolean value
    x-samos-hidden: true
    type: boolean
    syntax: jmespath
    value: 'ConnectionStatus == `Connected`'
    x-samos-fulfills:
      type-name: core.component
      property-name: active

