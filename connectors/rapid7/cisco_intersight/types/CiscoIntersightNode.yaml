x-samos-derived-properties:
  d_name:
    # The 'Hostname' property already fulfills "Machine:hostname",
    # so we cannot use the same property for "core.named-object:name",
    # Therefore property is derived.
    x-samos-hidden: true
    type: string
    syntax: jmespath
    value: 'HostName'
    items:
      type: string
    x-samos-fulfills:
      type-name: core.named-object
      property-name: name

  d_active:
    # To fulfill active? field with a boolean value
    x-samos-hidden: true
    type: boolean
    value: 'Status == `ONLINE`'
    syntax: jmespath
    x-samos-fulfills:
      type-name: core.component
      property-name: active

