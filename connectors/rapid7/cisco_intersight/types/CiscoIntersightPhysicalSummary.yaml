x-samos-derived-properties:
  d_hostnames:
    # Derived Hostname from Name field to fulfill
    x-samos-hidden: true
    type: array
    syntax: jmespath
    value: '[Name]|[?@]'
    items:
      type: string
    x-samos-fulfills:
      type-name: Machine
      property-name: hostnames

  d_active:
    # To fulfill active? field with a boolean value
    x-samos-hidden: true
    type: boolean
    value: 'Lifecycle == `Active`'
    syntax: expression
    x-samos-fulfills:
      type-name: core.component
      property-name: active

  d_qualified_names:
    # Corelation required for qualified hostnames
    title: Qualified Hostname
    x-samos-hidden: true
    type: string
    syntax: jmespath
    value: 'Name && contains(Name, `.`) && Name || null'
    x-samos-correlation:
      correlation-key: Machine.qualified-hostname
      correlation-type: Machine
      priority: 2

  d_unqualified_names:
    # Corelation required for unqualified hostnames
    title: Unqualified Hostname
    x-samos-hidden: true
    type: string
    syntax: jmespath
    value: 'Name && !contains(Name, `.`) && Name || null'
    x-samos-correlation:
      correlation-key: Machine.unqualified-hostname
      correlation-type: Machine
      priority: 2

