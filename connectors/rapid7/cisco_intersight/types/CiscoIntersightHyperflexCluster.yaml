x-samos-derived-properties:
  d_hostname:
    # Fulfilling hostname with the name value
    title: Hostname
    x-samos-hidden: true
    type: string
    syntax: jmespath
    value: '[Name]|[?@]'
    items:
      type: string
    x-samos-fulfills:
      type-name: Machine
      property-name: hostnames

  d_active:
    # To fulfill active? field with a boolean value
    title: Active?
    x-samos-hidden: true
    type: boolean
    value: 'Summary.State == `ONLINE`'
    syntax: jmespath
    x-samos-fulfills:
      type-name: core.component
      property-name: active

