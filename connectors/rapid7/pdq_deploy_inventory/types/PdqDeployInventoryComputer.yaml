x-samos-type-name: PdqDeployInventoryComputer
x-samos-namespace: pdq.deploy.inventory
title: PDQ Deploy Inventory Computer
description: A computer endpoint managed by PDQ Inventory.

x-samos-extends-types:
  - type-name: Machine
    subtype-priority: 3

x-samos-keys:
  - d_id

x-samos-table:
  - name: Name
  - name: HostName
  - name: IPAddress
  - name: OSName
  - name: Manufacturer
  - name: Model
  - name: HeartbeatDate

x-samos-detail:
  - name: Name
  - name: HostName
  - name: IPAddress
  - name: MacAddress
  - name: OSName
  - name: OSVersion
  - name: OSServicePack
  - name: d_os_architecture
  - name: Manufacturer
  - name: Model
  - name: Chassis
  - name: SerialNumber
  - name: Memory
  - name: x_collection_ids
  - name: IsOnline
  - name: CurrentUser
  - name: HeartbeatDate
  - name: Added
  - name: SuccessfulScanDate
  - name: BootTime
  - name: d_needs_reboot
  - name: BiosVersion
  - name: BiosManufacturer
  - name: DotNetVersions
  - name: PSVersion
  - name: TimeZone
  - name: SystemDrive
  - name: Description
  - name: ADDomain
  - name: ADDistinguishedName

x-samos-derived-properties:
  d_id:
    # ComputerId is an integer, but we want to use it as a string ID
    type: string
    title: ID
    syntax: expression
    value: '{ComputerId}'
    x-samos-immutable: true
    x-samos-hidden: true
    x-samos-fulfills:
      type-name: core.component
      property-name: id

  d_hostnames:
    type: array
    title: Hostnames
    x-samos-hidden: true
    syntax: jmespath
    value: '[HostName, Name] | [?@]'
    items:
      type: string
    x-samos-fulfills:
      type-name: Machine
      property-name: hostnames

  d_needs_reboot:
    type: boolean
    title: Needs Reboot
    syntax: jmespath
    value: 'NeedsReboot == `1`'
    x-samos-fulfills:
      type-name: Machine
      property-name: pending_reboot

  d_os_architecture:
    type: string
    title: OS Architecture
    syntax: expression
    value: '{OSArchitecture}'
    x-samos-fulfills:
      type-name: Machine
      property-name: os_architecture

  d_mitigations:
    x-samos-hidden: true
    type: array
    items:
      type: string
      x-samos-ref-types:
        - key-name: id
          type-name: Mitigation
    x-samos-fulfills:
      type-name: core.component
      property-name: mitigations
    syntax: jmespath
    # M1051	(Update Software) if NeedsReboot == `1`
    value: >-
      [
        NeedsReboot == `1` && `M1051` || null
      ] | [?@]

properties:
  ComputerId:
    type: integer
    title: Computer ID
    x-samos-immutable: true
    x-samos-hidden: true

  Name:
    type: string
    title: Name
    x-samos-fulfills:
      type-name: core.named-object
      property-name: name
    x-samos-correlation:
      correlation-key: Machine.unqualified-hostname
      correlation-type: Machine
      priority: 2

  HostName:
    type: string
    title: Hostname
    x-samos-correlation:
      correlation-key: Machine.unqualified-hostname
      correlation-type: Machine
      priority: 2

  IPAddress:
    type: string
    title: IP Address
    format: ip-addr
    x-samos-fulfills:
      type-name: Machine
      property-name: ips

  MacAddress:
    type: string
    title: MAC Address
    format: mac-addr
    x-samos-fulfills:
      type-name: Machine
      property-name: mac_addresses
    x-samos-correlation:
      correlation-key: MacAddr.value
      correlation-type: Machine
      priority: 3

  OSName:
    type: string
    title: Operating System
    x-samos-fulfills:
      type-name: Machine
      property-name: os_product

  OSVersion:
    type: string
    title: OS Version
    x-samos-fulfills:
      type-name: Machine
      property-name: os_version

  OSServicePack:
    type: string
    title: OS Service Pack

  OSArchitecture:
    type: integer
    title: OS Architecture
    X-samos-hidden: true

  OSInstallDate:
    type: string
    title: OS Install Date
    format: date-time

  OSSerialNumber:
    type: string
    title: OS Serial Number

  Manufacturer:
    type: string
    title: Manufacturer
    x-samos-fulfills:
      type-name: core.managed.asset
      property-name: make

  Model:
    type: string
    title: Model
    x-samos-fulfills:
      type-name: core.managed.asset
      property-name: model

  Chassis:
    type: string
    title: Chassis

  SerialNumber:
    type: string
    title: Serial Number
    x-samos-fulfills:
      type-name: core.managed.asset
      property-name: serial_number
    x-samos-correlation:
      correlation-key: core.managed.asset.serial_number
      correlation-type: Machine
      priority: 3

  Memory:
    type: integer
    title: Memory (Bytes)

  IsOnline:
    type: integer
    title: Online?

  CurrentUser:
    type: string
    title: Current User

  HeartbeatDate:
    type: string
    title: Last Heartbeat
    format: date-time
    x-samos-fulfills:
      type-name: core.managed.endpoint
      property-name: endpoint_last_seen

  Added:
    type: string
    title: Added
    format: date-time
    x-samos-fulfills:
      type-name: core.managed.endpoint
      property-name: endpoint_first_seen

  SuccessfulScanDate:
    type: string
    title: Last Successful Scan
    format: date-time
    x-samos-fulfills:
      type-name: core.managed.endpoint
      property-name: endpoint_last_scanned

  AttemptedScanDate:
    type: string
    title: Last Attempted Scan
    format: date-time

  BootTime:
    type: string
    title: Last Boot Time
    format: date-time

  NeedsReboot:
    type: integer
    title: Needs Reboot
    x-samos-hidden: true

  SimpleReasonForReboot:
    type: string
    title: Reason for Reboot

  BiosVersion:
    type: string
    title: BIOS Version

  BiosManufacturer:
    type: string
    title: BIOS Manufacturer

  BiosAssetTag:
    type: string
    title: BIOS Asset Tag

  SystemDrive:
    type: string
    title: System Drive

  SystemFamily:
    type: string
    title: System Family

  SystemSKU:
    type: string
    title: System SKU

  SystemVersion:
    type: string
    title: System Version

  Description:
    type: string
    title: Description
