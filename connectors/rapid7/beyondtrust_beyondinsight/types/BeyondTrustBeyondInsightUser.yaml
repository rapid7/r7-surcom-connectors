x-samos-type-name: BeyondTrustBeyondInsightUser
x-samos-namespace: beyondtrust.beyondinsight
title: BeyondInsight User
description: Represents a User from BeyondTrust BeyondInsight

x-samos-extends-types:
  - type-name: User

x-samos-keys:
  - d_user_id
  - EmailAddress # For reference by other types

x-samos-table:
  - name: UserName
  - name: LastName
  - name: DomainName
  - name: EmailAddress
  - name: d_x_group_ids
  - name: IsActive
  - name: LastLoginDate

x-samos-detail:
  - name: UserName
  - name: FirstName
  - name: LastName
  - name: DomainName
  - name: EmailAddress
  - name: d_x_group_ids
  - name: IsActive
  - name: DistinguishedName
  - name: IsQuarantined
  - name: LastLoginAuthenticationType
  - name: LastLoginConfigurationName
  - name: LastLoginSAMLIDPURL
  - name: LastLoginSSOURL
  - name: LastLoginDate

x-samos-derived-properties:
  # fulfills the 'UserName' string property to core.named-object.name
  # UserName property is used for user:username mapping in core.user
  d_username:
    x-samos-hidden: true
    type: string
    syntax: jmespath
    value: UserName
    x-samos-fulfills:
      type-name: core.named-object
      property-name: name

  # fulfills the 'UserID' integer property to user:id, which accepts a string type
  d_user_id:
    x-samos-hidden: true
    x-samos-immutable: true
    type: string
    syntax: jmespath
    value: UserID
    x-samos-fulfills:
      type-name: User
      property-name: id
  # fulfills the 'EmailAddress' string property to user:email
  d_email:
    x-samos-hidden: true
    type: string
    syntax: jmespath
    value: EmailAddress
    x-samos-fulfills:
      type-name: User
      property-name: email
    x-samos-correlation:
      correlation-key: User.email
      correlation-type: User
      priority: 4

  d_x_group_ids:
    title: Group(s)
    type: array
    syntax: jmespath
    value: x_group_ids
    items:
      type: string
      x-samos-ref-types:
        - type-name: BeyondTrustBeyondInsightUserGroup
          key-name: d_group_id
    x-samos-fulfills:
      type-name: core.principal
      property-name: groups

properties:
  AccessPolicyID:
    title: Access Policy ID
    type: integer
  ClientID:
    title: Client ID
    type: string
  DistinguishedName:
    title: Distinguished Name
    type: string
  DomainName:
    title: Domain Name
    type: string
  EmailAddress:
    # This property used for referencing from managed system ContactEmail property
    title: Email Address
    type: string
    x-samos-immutable: true
  FirstName:
    title: First Name
    type: string
    x-samos-fulfills:
      type-name: User
      property-name: first_name
  IsActive:
    title: Active?
    type: boolean
    x-samos-fulfills:
      type-name: core.principal
      property-name: active
  IsQuarantined:
    title: Quarantined?
    type: boolean
  LastLoginAuthenticationType:
    title: Last Login Authentication Type
    type: string
  LastLoginConfigurationName:
    title: Last Login Configuration Name
    type: string
  LastLoginDate:
    format: date-time
    title: Last Login Date
    type: string
    x-samos-fulfills:
      type-name: core.principal
      property-name: last_seen
  LastLoginSAMLIDPURL:
    title: Last Login SAML IDP URL
    type: string
  LastLoginSSOURL:
    title: Last Login SSO URL
    type: string
  LastName:
    title: Last Name
    type: string
    x-samos-fulfills:
      type-name: User
      property-name: last_name
  UserID:
    title: User ID
    type: integer
  UserName:
    title: User Name
    type: string
    x-samos-fulfills:
      type-name: User
      property-name: username
  x_group_ids:
    x-samos-hidden: true
    title: Group(s)
    type: array
    items:
      type: integer
