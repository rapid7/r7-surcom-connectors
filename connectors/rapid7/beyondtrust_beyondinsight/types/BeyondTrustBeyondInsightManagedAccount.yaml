x-samos-type-name: BeyondTrustBeyondInsightManagedAccount
x-samos-namespace: beyondtrust.beyondinsight
title: BeyondInsight Managed Account
description: Represents an Asset Managed Account from BeyondTrust BeyondInsight

x-samos-extends-types:
  - type-name: User

x-samos-keys:
  - d_id # unique derived property

x-samos-table:
  - name: AccountName
  - name: Description
  - name: SystemName
  - name: DomainName
  - name: PlatformID
  - name: IsChanging
  - name: IsISAAccess
  - name: LastChangeDate
  - name: NextChangeDate

x-samos-detail:
  - name: AccountName
  - name: Description
  - name: SystemName
  - name: DomainName
  - name: SystemId
  - name: PlatformID
  - name: IsChanging
  - name: IsISAAccess
  - name: ChangeState
  - name: UserPrincipalName
  - name: DefaultReleaseDuration
  - name: MaximumReleaseDuration
  - name: ApplicationDisplayName
  - name: LastChangeDate
  - name: NextChangeDate

x-samos-derived-properties:
  # Derived 'id' string property to map to core.component.id which is "id" property is accepted string type
  d_id:
    x-samos-hidden: true
    x-samos-immutable: true
    type: string
    syntax: expression
    value: '{AccountId}'
    x-samos-fulfills:
      type-name: User
      property-name: id

  d_service_account:
    x-samos-hidden: true
    type: boolean
    syntax: jmespath
    value: 'true'
    x-samos-fulfills:
      type-name: core.principal
      property-name: is_service_account

properties:
  AccountId:
    title: Account ID
    type: integer
    x-samos-immutable: true
    x-samos-hidden: true
  AccountName:
    title: Account
    type: string
    x-samos-fulfills:
      type-name: core.named-object
      property-name: name
    x-samos-correlation:
      correlation-key: User.sAMAccountName
      correlation-type: User
      priority: 4
  ApplicationDisplayName:
    title: Application Display Name
    type: string
  ApplicationID:
    title: Application ID
    type: integer
  ChangeState:
    title: Change State
    type: integer
  DefaultReleaseDuration:
    title: Default Release Duration
    type: integer
  DomainName:
    title: Domain Name
    type: string
  InstanceName:
    title: Instance Name
    type: string
  IsChanging:
    title: Changing?
    type: boolean
  IsISAAccess:
    title: ISA Access?
    type: boolean
    x-samos-fulfills:
      type-name: core.principal
      property-name: active
  LastChangeDate:
    format: date-time
    title: Last Change Date
    type: string
  MaximumReleaseDuration:
    title: Maximum Release Duration
    type: integer
  NextChangeDate:
    format: date-time
    title: Next Change Date
    type: string
    x-samos-fulfills:
      type-name: core.principal
      property-name: end_date
  PlatformID:
    title: Platform
    type: integer
    x-samos-ref-types:
      - type-name: BeyondTrustBeyondInsightPlatform
        key-name: PlatformID
  PreferredNodeID:
    title: Preferred Node ID
    type: string
  SystemId:
    title: System
    type: integer
    x-samos-ref-types:
      - type-name: BeyondTrustBeyondInsightAsset
        key-name: ManagedSystemID
      - type-name: BeyondTrustBeyondInsightCloud
        key-name: ManagedSystemID
      - type-name: BeyondTrustBeyondInsightDatabase
        key-name: ManagedSystemID
      - type-name: BeyondTrustBeyondInsightDirectory
        key-name: ManagedSystemID
  SystemName:
    title: System
    type: string
  UserPrincipalName:
    title: User Principal Name
    type: string
