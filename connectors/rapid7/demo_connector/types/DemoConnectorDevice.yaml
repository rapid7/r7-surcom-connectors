x-samos-type-name: DemoConnectorDevice
x-samos-namespace: demo.connector
title: Demo Connector Device
description: A device imported from the Demo Connector.

x-samos-extends-types:
  - type-name: Machine
    subtype-priority: 3

x-samos-keys:
  - id

x-samos-table:
  - name: name
  - name: hostname
  - name: type
  - name: owner

x-samos-detail:
  - name: name
  - name: hostname
  - name: type
  - name: owner

properties:
  id:
    title: Object ID
    type: string
    x-samos-immutable: true
    x-samos-fulfills:
      type-name: core.component
      property-name: id

  name:
    title: Name
    type: string
    x-samos-fulfills:
      type-name: core.named-object
      property-name: name

  type:
    title: Device Type
    type: string
    x-samos-fulfills:
      type-name: core.managed.asset
      property-name: asset_type

  owner:
    title: Owner
    type: string
    x-samos-ref-types:
      - type-name: DemoConnectorUser
        key-name: email
    x-samos-fulfills:
      type-name: core.owned-entity
      property-name: owners

  hostname:
    title: Hostname
    type: string
    x-samos-fulfills:
      type-name: Machine
      property-name: hostnames
    x-samos-correlation:
      correlation-key: Machine.unqualified-hostname
      correlation-type: Machine
      priority: 3
