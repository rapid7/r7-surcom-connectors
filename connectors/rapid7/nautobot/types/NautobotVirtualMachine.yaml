x-samos-type-name: NautobotVirtualMachine
x-samos-namespace: nautobot
title: Nautobot Virtual Machine
description: Virtual machine from Nautobot
x-samos-detail-prefer-type-title: true
x-samos-extends-types:
  - type-name: Machine
    subtype-priority: 3

$ref: https://example.nautobot.com/api/swagger#/components/schemas/PaginatedVirtualMachineList#/components/schemas/VirtualMachine

x-samos-keys:
  - id

x-samos-table:
  - name: name
  - name: status.name
  - name: cluster.id
  - name: role.name
  - name: tenant.id
  - name: vcpus
  - name: memory
  - name: disk
  - name: primary_ip4.id
  - name: created
  - name: last_updated

x-samos-detail:
  - name: name
  - name: d_active
  - name: cluster.id
  - name: platform.name
  - name: role.name
  - name: tenant.id
  - name: primary_ip4.id
  - name: vcpus
  - name: memory
  - name: disk
  - name: comments
  - name: software_version.name
  - name: d_tags
  - name: custom_fields
  - name: created
  - name: last_updated
  - name: url

x-samos-derived-properties:
  d_active:
    title: Active?
    type: boolean
    syntax: jmespath
    value: "status.name == 'Active'"
    x-samos-fulfills:
      type-name: core.component
      property-name: active

  d_qualified_hostname:
    title: Qualified Hostname
    type: string
    syntax: jmespath
    value: 'name && contains(name, `.`) && name || null'
    x-samos-hidden: true
    x-samos-correlation:
      correlation-key: Machine.qualified-hostname
      correlation-type: Machine
      priority: 3

  d_unqualified_hostname:
    title: Unqualified Hostname
    type: string
    syntax: jmespath
    value: 'name && !contains(name, `.`) && name || null'
    x-samos-hidden: true
    x-samos-correlation:
      correlation-key: Machine.unqualified-hostname
      correlation-type: Machine
      priority: 3

  d_ip_addresses:
    title: IP Addresses
    type: array
    syntax: jmespath
    value: '[primary_ip4.host, primary_ip6.host][?@]'
    items:
      type: string
      format: ip-addr
    x-samos-fulfills:
      type-name: Machine
      property-name: ips

  d_asset_type:
    title: Asset Type
    type: string
    syntax: expression
    value: 'Virtual Machine'
    x-samos-hidden: true
    x-samos-fulfills:
      type-name: core.managed.asset
      property-name: asset_type

  d_tags:
    title: Tags
    type: array
    syntax: jmespath
    value: 'tags[*].id'
    items:
      type: string
      x-samos-ref-types:
        - type-name: NautobotTag
          key-name: id
    x-samos-fulfills:
      type-name: core.component
      property-name: source_tags

