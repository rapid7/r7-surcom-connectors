x-samos-derived-properties:
  d_active:
    # Derived because value is calculated from status.name
    title: Active?
    type: boolean
    syntax: jmespath
    value: "status.name == 'Active'"
    x-samos-fulfills:
      type-name: core.component
      property-name: active

  d_qualified_hostname:
    title: Qualified Hostname
    type: string
    syntax: jmespath
    value: 'name && contains(name, `.`) && name || null'
    x-samos-hidden: true
    x-samos-correlation:
      correlation-key: Machine.qualified-hostname
      correlation-type: Machine
      priority: 3

  d_unqualified_hostname:
    title: Unqualified Hostname
    type: string
    syntax: jmespath
    value: 'name && !contains(name, `.`) && name || null'
    x-samos-hidden: true
    x-samos-correlation:
      correlation-key: Machine.unqualified-hostname
      correlation-type: Machine
      priority: 3

  d_ip_addresses:
    # Derived because IPs are combined from two nested objects and CIDR prefix must be stripped
    title: IP Addresses
    type: array
    x-samos-hidden: true
    syntax: jmespath
    value: '[primary_ip4.host, primary_ip6.host][?@]'
    items:
      type: string
      format: ip-addr
    x-samos-fulfills:
      type-name: Machine
      property-name: ips

  d_tags:
    # Derived because tags are nested objects in Nautobot but core.component.source_tags expects an array of string tag names
    title: Tags
    type: array
    syntax: jmespath
    value: 'tags[*].id'
    items:
      type: string
      x-samos-ref-types:
        - type-name: NautobotTag
          key-name: id
    x-samos-fulfills:
      type-name: core.component
      property-name: source_tags

