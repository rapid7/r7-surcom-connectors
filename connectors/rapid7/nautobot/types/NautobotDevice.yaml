x-samos-type-name: NautobotDevice
x-samos-namespace: nautobot
title: Nautobot Device
description: Physical network device from Nautobot including servers, switches, routers, and other infrastructure hardware
x-samos-detail-prefer-type-title: true
x-samos-extends-types:
  - type-name: Machine
    subtype-priority: 5

$ref: https://example.nautobot.com/api/swagger#/components/schemas/PaginatedDeviceList#/components/schemas/Device

x-samos-keys:
