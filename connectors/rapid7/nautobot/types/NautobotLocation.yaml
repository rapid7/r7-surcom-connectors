x-samos-derived-properties:
  d_latitude:
    # latitude property in string but core.location.latitude requires number,
    # derived property to convert to number for fulfilling core.location.latitude
    title: Latitude
    type: number
    syntax: expression
    value: '{latitude}'
    x-samos-hidden: true
    x-samos-fulfills:
      type-name: core.location
      property-name: latitude
  d_longitude:
    # longitude property in string but core.location.longitude requires number,
    # derived property to convert to number for fulfilling core.location.longitude
    title: Longitude
    type: number
    syntax: expression
    value: '{longitude}'
    x-samos-hidden: true
    x-samos-fulfills:
      type-name: core.location
      property-name: longitude

