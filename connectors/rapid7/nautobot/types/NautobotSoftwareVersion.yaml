x-samos-type-name: NautobotSoftwareVersion
x-samos-namespace: nautobot
title: Nautobot Software Version
description: Software version definition from Nautobot representing firmware or OS versions for network devices
x-samos-detail-prefer-type-title: true
x-samos-extends-types:
  - type-name: Software
    subtype-priority: 5

$ref: https://example.nautobot.com/api/swagger#/components/schemas/PaginatedSoftwareVersionList#/components/schemas/SoftwareVersion

x-samos-keys:
  - id

x-samos-table:
  - name: version
  - name: alias
  - name: status.name
  - name: platform.name
  - name: release_date
  - name: end_of_support_date
  - name: long_term_support
