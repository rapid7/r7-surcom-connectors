x-samos-derived-properties:
  d_vendor_version:
    # Concatenates the vendor, product, and version into a single string,
    # for fulfilling the 'Software:Software.vendor-product-version'
    type: string
    title: Vendor Product Version
    x-samos-hidden: true
    syntax: jmespath
    value: join(`-`,[platform.name,alias,version][?@])
    x-samos-correlation:
      correlation-key: Software.vendor-product-version
      correlation-type: Software
      priority: 3
  d_status:
    x-samos-hidden: true
    title: Active?
    type: boolean
    syntax: jmespath
    value: "status.name == 'Active'"
    x-samos-fulfills:
      type-name: core.component
      property-name: active

