x-samos-type-name: NautobotPrefix
x-samos-namespace: nautobot
title: Nautobot Prefix
description: Network prefix (subnet) from Nautobot representing IP address ranges in CIDR notation with status, VLAN assignments, and location details
x-samos-detail-prefer-type-title: true
x-samos-extends-types:
  - type-name: Network
    subtype-priority: 5

$ref: https://example.nautobot.com/api/swagger#/components/schemas/PaginatedPrefixList#/components/schemas/Prefix

x-samos-keys:
  - id

x-samos-table:
  - name: prefix
  - name: namespace.name
  - name: status.name
  - name: tenant.id
  - name: vlan.id
  - name: role.name
  - name: description
  - name: created
  - name: last_updated

x-samos-detail:
  - name: prefix
  - name: display
  - name: description
  - name: status.name
  - name: network
  - name: broadcast
  - name: prefix_length
  - name: ip_version
