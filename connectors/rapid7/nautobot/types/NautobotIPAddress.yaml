x-samos-type-name: NautobotIPAddress
x-samos-namespace: nautobot
title: Nautobot IP Address
description: IP address assignment from Nautobot including IPv4 and IPv6 addresses with their DNS names, status, and interface assignments
x-samos-detail-prefer-type-title: true
x-samos-global-zone: true
x-samos-extends-types:
  - type-name: IpAddress
  - type-name: core.owned-entity
    subtype-priority: 4

$ref: https://example.nautobot.com/api/swagger#/components/schemas/PaginatedIPAddressList#/components/schemas/IPAddress

x-samos-keys:
  - id

x-samos-table:
  - name: address
  - name: type
  - name: status.name
  - name: role.name
  - name: tenant.id
  - name: dns_name
  - name: created
  - name: last_updated

x-samos-detail:
  - name: address
  - name: type
  - name: status.name
  - name: tenant.id
  - name: dns_name
  - name: parent.id
  - name: ip_version
  - name: description
  - name: host
  - name: mask_length
  - name: nat_inside
  - name: d_tags
  - name: created
  - name: last_updated
  - name: custom_fields
  - name: url

x-samos-derived-properties:
  d_version:
    # Derived because Nautobot provides IP version as an integer,
    # but fulfilling core.ip-address.version requires a string value of "IPv4" or "IPv6"
    title: IP Version
    type: string
    syntax: expression
    value: '{ip_version}'
    x-samos-hidden: true
    x-samos-fulfills:
      type-name: IpAddress
      property-name: version
  d_status:
    title: Active?
    type: boolean
    syntax: jmespath
    value: "status.name == 'Active'"
    x-samos-fulfills:
      type-name: core.component
      property-name: active
  d_tags:
    # tags are in array of objects, so we cannot directly fulfill source_tags which is array of strings,
    # derived property list all ids to fulfill source_tags.
    title: Tags
    type: array
    syntax: jmespath
    value: 'tags[*].id'
    items:
      type: string
      x-samos-ref-types:
        - type-name: NautobotTag
          key-name: id
    x-samos-fulfills:
      type-name: core.component
      property-name: source_tags

