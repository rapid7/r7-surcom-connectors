x-samos-type-name: ForgeRockUser
x-samos-namespace: forgerock
title: PingOne AIC User
description: A User from PingOne Advanced Identity Cloud (ForgeRock).

x-samos-extends-types:
  - type-name: User
    subtype-priority: 3

x-samos-keys:
  - _id

x-samos-table:
  - name: userName
  - name: d_name
  - name: mail
  - name: d_active
  - name: passwordLastChangedTime

x-samos-detail:
  - name: userName
  - name: d_name
  - name: mail
  - name: d_active
  - name: givenName
  - name: sn
  - name: cn
  - name: displayName
  - name: description
  - name: telephoneNumber
  - name: city
  - name: stateProvince
  - name: country
  - name: postalAddress
  - name: postalCode
  - name: memberOfOrgIDs
  - name: d_groups
  - name: effectiveRoles
  - name: effectiveApplications
  - name: effectiveAssignments
  - name: preferences
  - name: profileImage
  - name: consentedMappings
  - name: aliasList
  - name: kbaInfo
  - name: devicePrintProfiles
  - name: deviceProfiles
  - name: oathDeviceProfiles
  - name: pushDeviceProfiles
  - name: webauthnDeviceProfiles
  - name: passwordLastChangedTime
  - name: passwordExpirationTime

x-samos-derived-properties:
  d_name:
    # Concatenate givenName + sn to fulfill core.named-object.name
    type: string
    title: Full Name
    syntax: expression
    value: '{givenName} {sn}'
    x-samos-fulfills:
      type-name: core.named-object
      property-name: name

  d_active:
    # Convert string accountStatus to boolean for core.principal.active
    title: Active?
    type: boolean
    value: 'accountStatus == `active`'
    syntax: jmespath
    x-samos-fulfills:
      type-name: core.principal
      property-name: active

  d_groups:
    # Extract _refResourceId from nested objects to fulfill core.principal.groups (requires ref-types)
    title: Groups
    type: array
    syntax: jmespath
    value: 'effectiveGroups[*]._refResourceId'
    items:
      type: string
      x-samos-ref-types:
        - type-name: ForgeRockGroup
          key-name: _id
    x-samos-fulfills:
      type-name: core.principal
      property-name: groups

properties:
  _id:
    title: Object ID
    type: string
    x-samos-immutable: true
    x-samos-hidden: true
    x-samos-fulfills:
      type-name: User
      property-name: id
  _rev:
    title: Revision
    type: string
    x-samos-hidden: true
  userName:
    title: Username
    type: string
    x-samos-fulfills:
      type-name: User
      property-name: username
  givenName:
    title: First Name
    type: string
    x-samos-fulfills:
      type-name: User
      property-name: first_name
  sn:
    title: Last Name
    type: string
    x-samos-fulfills:
      type-name: User
      property-name: last_name
  cn:
    title: Common Name
    type: string
  mail:
    title: Email
    type: string
    x-samos-fulfills:
      type-name: User
      property-name: email
    x-samos-correlation:
      correlation-key: User.email
      correlation-type: User
      priority: 4
  displayName:
    title: Display Name
    type: string
  description:
    title: Description
    type: string
    x-samos-fulfills:
      type-name: core.named-object
      property-name: description
  accountStatus:
    title: Account Status
    type: string
  telephoneNumber:
    title: Phone
    type: string
    x-samos-fulfills:
      type-name: User
      property-name: telephone
  city:
    title: City
    type: string
    x-samos-fulfills:
      type-name: core.location
      property-name: city
  country:
    title: Country
    type: string
    # No fulfillment for core.location.country as ForgeRock gives free text fields for country instead of standardized codes
  stateProvince:
    title: State
    type: string
    x-samos-fulfills:
      type-name: core.location
      property-name: state
  postalAddress:
    title: Postal Address
    type: string
    x-samos-fulfills:
      type-name: core.location
      property-name: address
  postalCode:
    title: Postal Code
    type: string
    x-samos-fulfills:
      type-name: core.location
      property-name: postal_code
  profileImage:
    title: Profile Image
    type: string
  preferences:
    title: Preferences
    type: object
  passwordLastChangedTime:
    title: Password Last Changed
    type: string
    format: date-time
  passwordExpirationTime:
    title: Password Expiration
    type: string
    format: date-time
  memberOfOrgIDs:
    title: Organization Memberships
    type: array
    items:
      type: string
      x-samos-ref-types:
        - type-name: ForgeRockOrganization
          key-name: _id
  effectiveRoles:
    title: Effective Roles
    type: array
    items:
      type: object
      properties:
        _refResourceId:
          title: Role ID
          type: string
          x-samos-ref-types:
            - type-name: ForgeRockRole
              key-name: _id
  effectiveGroups:
    x-samos-hidden: true
    title: Effective Groups
    type: array
    items:
      type: object
      properties:
        _refResourceId:
          title: Group ID
          type: string
          x-samos-ref-types:
            - type-name: ForgeRockGroup
              key-name: _id
  effectiveApplications:
    title: Effective Applications
    type: array
    items:
      type: object
      properties:
        _refResourceId:
          title: Application ID
          type: string
          x-samos-ref-types:
            - type-name: ForgeRockApplication
              key-name: _id
        name:
          title: Application Name
          type: string
  effectiveAssignments:
    title: Effective Assignments
    type: array
    items:
      type: object
  consentedMappings:
    title: Consented Mappings
    type: array
    items:
      type: object
  aliasList:
    title: Alias List
    type: array
    items:
      type: string
  kbaInfo:
    title: Knowledge-Based Auth Info
    type: array
    items:
      type: object
